<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appartements — Agence Immobilière Hamdaoui</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="transitions.js"></script>
<script src="data.js"></script>
</head>
<body>

<nav>
  <span class="logo-wrap"><img src="./logo.png" class="logo"></span>
  <div class="links">
    <a href="index.html">Accueil</a>
    <a href="offres.html">Offres</a>
    <a href="appartements.html" class="active">Appartements</a>
    <a href="booking.html">Booking</a>
    <a href="laisser-avis.html">Votre avis</a>
    <a href="login.html" id="navLoginLink" style="border:1px solid rgba(201,161,90,0.35);padding:7px 16px;border-radius:999px;">Connexion</a>
  </div>
</nav>

<div class="page-header">
  <h1>Appartements disponibles</h1>
  <p>Une sélection de biens vérifiés, mis à jour régulièrement.</p>
</div>

<section id="apartments" class="section">
<div class="section-inner">

  <!-- Type tabs : Location / Vente -->
  <div class="type-tabs" id="typeTabs">
    <button class="type-tab active" onclick="setType('all', this)">Tous</button>
    <button class="type-tab" onclick="setType('Location', this)">Location</button>
    <button class="type-tab" onclick="setType('Vente', this)">Vente</button>
  </div>

  <!-- Filtre secondaire -->
  <div class="filters" style="margin-top:16px;">
    <button onclick="setCategory('all')" class="filter-active" id="cat-all">Tous types</button>
    <button onclick="setCategory('f2')" id="cat-f2">F2</button>
    <button onclick="setCategory('f3')" id="cat-f3">F3</button>
    <button onclick="setCategory('villa')" id="cat-villa">Villa</button>
    <button onclick="setCategory('studio')" id="cat-studio">Studio</button>
  </div>

  <div class="apartment-grid" id="apartmentGrid"></div>

</div>
</section>

<a href="https://wa.me/213XXXXXXXXX" class="whatsapp" target="_blank">
  <svg viewBox="0 0 32 32"><path fill="#06140c" d="M16.004 3C9.376 3 4 8.373 4 15c0 2.39.704 4.613 1.92 6.49L4 29l7.73-1.873A11.93 11.93 0 0 0 16.004 27C22.63 27 28 21.627 28 15S22.63 3 16.004 3Zm6.97 16.97c-.297.836-1.47 1.59-2.03 1.677-.52.08-1.17.114-1.886-.117-.435-.14-.994-.327-1.71-.64-3.01-1.3-4.973-4.33-5.122-4.532-.148-.2-1.216-1.616-1.216-3.08 0-1.465.77-2.183 1.043-2.482.272-.298.594-.373.792-.373.198 0 .396.002.569.01.182.01.426-.07.668.51.248.594.84 2.06.916 2.21.074.15.124.327.025.523-.1.198-.15.322-.297.495-.148.174-.31.39-.445.524-.148.148-.302.31-.13.61.173.297.77 1.27 1.654 2.058 1.137 1.013 2.095 1.327 2.394 1.476.297.148.471.124.643-.074.173-.198.74-.864.94-1.16.198-.298.396-.248.668-.149.272.1 1.738.82 2.034.968.297.149.495.223.569.347.074.124.074.717-.223 1.553Z"/></svg>
  WhatsApp
</a>

<footer><p>© Agence Immobilière Hamdaoui Depuis 1994</p></footer>

<script>
// Nav session
const session = DB.getSession();
const loginLink = document.getElementById('navLoginLink');
if (session) {
  loginLink.textContent = session.role==='admin' ? '⚙ Admin' : session.name.split(' ')[0];
  loginLink.href = session.role==='admin' ? 'admin.html' : 'espace-client.html';
}

let currentType = 'all';
let currentCategory = 'all';

const PIN_SVG = `<svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>`;

function renderGrid() {
  let props = DB.getProperties().filter(p => p.available);

  if (currentType !== 'all') {
    props = props.filter(p => {
      const badge = (p.badge || '').toLowerCase();
      return badge.includes(currentType.toLowerCase());
    });
  }

  if (currentCategory !== 'all') {
    props = props.filter(p => (p.type||'').toLowerCase() === currentCategory);
  }

  const grid = document.getElementById('apartmentGrid');

  if (!props.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--ivory-faint);">
      <p style="font-size:15px;">Aucun bien disponible dans cette catégorie pour le moment.</p>
    </div>`;
    return;
  }

  grid.innerHTML = props.map(p => {
    const img = p.image || 'https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=600&q=80';
    const link = p.detailPage || 'appartements.html';
    const isLocation = (p.badge||'').includes('Location');
    return `
      <a href="${link}" class="apartment-card">
        <div class="thumb">
          <span class="type-badge">${p.badge || p.type}</span>
          ${isLocation ? `<span style="position:absolute;top:14px;right:14px;z-index:3;padding:4px 11px;border-radius:999px;background:rgba(37,211,102,0.85);color:#06140c;font-size:11px;font-weight:700;letter-spacing:0.3px;">Location</span>` : ''}
          <img src="${img}" alt="${p.title}" loading="lazy">
        </div>
        <div class="body">
          <h3>${p.title}</h3>
          <div class="location">${PIN_SVG} ${p.location}</div>
          <div class="price-row">
            <span class="price">${p.price} DA</span>
            <span class="view-link">Voir le détail →</span>
          </div>
        </div>
      </a>`;
  }).join('');
}

function setType(type, btn) {
  currentType = type;
  document.querySelectorAll('.type-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function setCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('filter-active'));
  document.getElementById('cat-' + cat).classList.add('filter-active');
  renderGrid();
}

renderGrid();
</script>
</body>
</html>
