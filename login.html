<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Agence Immobilière Hamdaoui</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="transitions.js"></script>
<script src="data.js"></script>
</head>
<body class="login-page">

<div class="login-box">

  <div class="login-logo">
    <div><span>AH</span></div>
    <h2>Espace Hamdaoui</h2>
    <p>Connectez-vous à votre compte</p>
  </div>

  <label for="email">Adresse e-mail</label>
  <input type="email" id="email" placeholder="votre@email.com" autocomplete="email">

  <label for="password">Mot de passe</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">

  <div class="login-error" id="loginError">E-mail ou mot de passe incorrect.</div>

  <button class="booking-btn" id="loginBtn" style="margin-top:24px;" onclick="doLogin()">
    Se connecter
  </button>

  <a href="index.html" class="login-back">← Retour au site</a>

</div>

<script>
// Si déjà connecté, rediriger
const s = DB.getSession();
if (s) window.location.href = s.role === 'admin' ? 'admin.html' : 'index.html';

// Connexion au Enter
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const err      = document.getElementById('loginError');
  const btn      = document.getElementById('loginBtn');

  err.style.display = 'none';
  btn.textContent = 'Connexion...';
  btn.disabled = true;

  setTimeout(() => {
    const user = DB.findUser(email, password);
    if (user) {
      DB.setSession(user);
      window.location.href = user.role === 'admin' ? 'admin.html' : 'index.html';
    } else {
      err.style.display = 'block';
      btn.textContent = 'Se connecter';
      btn.disabled = false;
    }
  }, 500);
}
</script>

</body>
</html>
