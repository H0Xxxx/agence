<div class="page-header">
<h1>Réservation</h1>
<p>Choisissez un service, une date, et nous nous occupons du reste.</p>
</div>

<!-- BOOKING -->
<section id="booking" class="section">
<div class="section-inner">

<div class="booking-box">

<form id="bookingForm">

<input type="text" id="name" placeholder="Votre nom" required>
<input type="tel" id="phone" placeholder="Téléphone" required>

<select id="service">
<option>Choisir service</option>
<option>Offre 1</option>
<option>Offre 2</option>
<option>Offre 3</option>
</select>

<input type="date" id="date" required>

<select id="time">
<option>09:00</option>
<option>10:00</option>
<option>11:00</option>
<option>14:00</option>
<option>15:00</option>
<option>16:00</option>
</select>

<button type="submit" class="booking-btn">
Confirmer la réservation
</button>

</form>

<p id="message"></p>

</div>

<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3196.8686583369986!2d5.061999075115498!3d36.74972357226159!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x12f2cd002df7b777%3A0x5886d7f45b92cae4!2sAgence%20immobili%C3%A8re%20Hamdaoui%20Zoubir!5e0!3m2!1sfr!2sdz!4v1781743964196!5m2!1sfr!2sdz" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
